name: Deploy to Test

on:
  push:
    branches:
      - develop

jobs:
  deploy-test:
    name: Deploy to Test Environment
    runs-on: self-hosted  # Runs on your Ubuntu iMac server runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set variables
        run: |
          echo "BASE=/home/andrew/web_server/html" >> $GITHUB_ENV
          echo "TEST_ROOT=/home/andrew/web_server/html/test" >> $GITHUB_ENV
          echo "BACKUP_DIR=/home/andrew/web_server/html/test_backup_$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Backup current /test content
        run: |
          set -euo pipefail
          echo "=== Backing up existing /test to: $BACKUP_DIR ==="
          mkdir -p "$BACKUP_DIR"
          if [ -d "$TEST_ROOT" ]; then
            cp -r "$TEST_ROOT"/. "$BACKUP_DIR"/
          else
            echo "No existing $TEST_ROOT directory; creating it."
            mkdir -p "$TEST_ROOT"
          fi

      - name: Deploy new content to /test (rsync --delete)
        run: |
          set -euo pipefail
          echo "=== Deploying html/test -> $TEST_ROOT ==="
          rsync -av --delete html/test/ "$TEST_ROOT"/

      # Optional: restart not required for static files, but harmless if you prefer it
      - name: Restart nginx-test container
        run: |
          echo "Restarting nginx-test container..."
          docker restart nginx-test || true
          sleep 5

      - name: Verify Test via HTTP
        run: |
          set -euo pipefail
          echo "=== HTTP checks against https://test.mitchellnet.local ==="
          curl -skI https://test.mitchellnet.local/ | head -n1 | grep "200"
          curl -skI https://test.mitchellnet.local/header.html | grep "200"
          curl -skI https://test.mitchellnet.local/js/includes.js | grep "200"
          curl -skI https://test.mitchellnet.local/css/style.css | grep "200"
          curl -sk  https://test.mitchellnet.local/ | grep -qi "Test Environment" && echo "Content looks like TEST ✅"

      - name: Rollback if verification fails
        if: failure()
        run: |
          set -euo pipefail
