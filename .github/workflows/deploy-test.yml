name: Deploy to Test

on:
  push:
    branches:
      - develop

jobs:
  deploy-test:
    name: Deploy to Test Environment
    runs-on: self-hosted   # 🖥 Runs directly on your Ubuntu server runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backup current /test content
        run: |
          echo "=== Backing up existing /test ==="
          BACKUP_DIR="/home/andrew/web_server/html/test_backup_$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$BACKUP_DIR"
          cp -r /home/andrew/web_server/html/test/* "$BACKUP_DIR"/
          echo "Backup stored at: $BACKUP_DIR"

      - name: Deploy new content to /test
        run: |
          echo "=== Deploying new test content ==="
          cp -r html/test/* /home/andrew/web_server/html/test/
          echo "Deployment complete."

      - name: Restart nginx-test container
        run: |
          echo "Restarting nginx-test container..."
          docker restart nginx-test
          sleep 5

      - name: Verify Test Container
        run: |
          echo "=== Verifying nginx-test container ==="
          TITLE=$(docker exec nginx-test grep -o "Test Environment" /usr/share/nginx/html/index.html || true)
          if [ -z "$TITLE" ]; then
            echo "❌ Verification failed: 'Test Environment' not found in /usr/share/nginx/html/index.html"
            exit 1
          else
            echo "✅ Verification passed: Test environment confirmed."
          fi

      - name: Rollback if verification fails
        if: failure()
        run: |
          echo "=== Rolling back to previous backup ==="
          LATEST_BACKUP=$(ls -td /home/andrew/web_server/html/test_backup_* | head -1)
          if [ -d "$LATEST_BACKUP" ]; then
            rm -rf /home/andrew/web_server/html/test/*
            cp -r "$LATEST_BACKUP"/* /home/andrew/web_server/html/test/
            echo "Rollback completed using backup: $LATEST_BACKUP"
          else
            echo "⚠️ No backup directory found to restore from!"
          fi

      - name: Retention — delete backups older than 7 days
        run: |
          echo "=== Cleaning up old backups ==="
          find /home/andrew/web_server/html/ -maxdepth 1 -type d -name "test_backup_*" -mtime +7 -exec rm -rf {} \;
          echo "Old backups cleaned up."

