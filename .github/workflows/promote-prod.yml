name: Promote to Production

on:
  workflow_dispatch:

jobs:
  promote-prod:
    name: Promote Tested Code to Production
    runs-on: self-hosted  # Runs on your Ubuntu iMac server runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set variables
        run: |
          echo "BASE=/home/andrew/web_server/html" >> $GITHUB_ENV
          echo "PROD_ROOT=/home/andrew/web_server/html/prod" >> $GITHUB_ENV
          echo "BACKUP_DIR=/home/andrew/web_server/html/prod_backup_$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Backup current /prod content
        run: |
          set -euo pipefail
          echo "=== Backing up existing /prod to: $BACKUP_DIR ==="
          mkdir -p "$BACKUP_DIR"
          if [ -d "$PROD_ROOT" ]; then
            cp -r "$PROD_ROOT"/. "$BACKUP_DIR"/
          else
            echo "No existing $PROD_ROOT directory; creating it."
            mkdir -p "$PROD_ROOT"
          fi

      - name: Deploy new content to /prod (rsync --delete)
        run: |
          set -euo pipefail
          echo "=== Deploying html/prod -> $PROD_ROOT ==="
          rsync -av --delete html/prod/ "$PROD_ROOT"/

      # Optional: restart not required for static files, but harmless if you prefer it
      - name: Restart nginx-prod container
        run: |
          echo "Restarting nginx-prod container..."
          docker restart nginx-prod || true
          sleep 5

      - name: Verify Prod via HTTP
        run: |
          set -euo pipefail
          echo "=== HTTP checks against https://prod.mitchellnet.local ==="
          curl -skI https://prod.mitchellnet.local/ | head -n1 | grep "200"
          curl -skI https://prod.mitchellnet.local/header.html | grep "200"
          curl -skI https://prod.mitchellnet.local/js/includes.js | grep "200"
          curl -skI https://prod.mitchellnet.local/css/style.css | grep "200"
          curl -sk  https://prod.mitchellnet.local/ | grep -qi "Production" && echo "Content looks like PROD ✅"

      - name: Rollback if verification fails
        if: failure()
        run: |
          set -euo pipefail
          echo "=== Rolling back to previous backup ==="
          LATEST_BACKUP=$(ls -td "$BASE"/prod_backup_* 2>/dev/null | head -1 || true)
          if [ -n "${LATEST_BACKUP:-}" ] && [ -d "$LATEST_BACKUP" ]; then
            rsync -av --delete "$LATEST_BACKUP"/ "$PROD_ROOT"/
            echo "Rollback completed using backup: $LATEST_BACKUP"
          else
            echo "⚠️ No backup directory found to restore from!"
          fi

      - name: Retention — delete prod backups older than 7 days
        run: |
          set -euo pipefail
          echo "=== Cleaning up old prod backups (>7 days) ==="
          find "$BASE" -maxdepth 1 -type d -name "prod_backup_*" -mtime +7 -print -exec rm -rf {} \;
          echo "Cleanup complete."

      # Optional: reload proxy if its config changed (kept here for convenience)
      # - name: Reload nginx-proxy (optional)
      #   run: docker exec nginx-proxy nginx -t && docker exec nginx-proxy nginx -s reload || true
