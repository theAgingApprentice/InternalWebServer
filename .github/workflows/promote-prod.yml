name: Promote to Production

on:
  workflow_dispatch:

jobs:
  promote-prod:
    name: Promote Tested Code to Production
    runs-on: self-hosted   # ✅ Run on your iMac Ubuntu server directly

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backup current /prod content
        run: |
          echo "=== Backing up existing /prod ==="
          BACKUP_DIR="/home/andrew/web_server/html/prod_backup_$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$BACKUP_DIR"
          cp -r /home/andrew/web_server/html/prod/* "$BACKUP_DIR"/
          echo "Backup stored at: $BACKUP_DIR"

      - name: Deploy new content to /prod
        run: |
          echo "=== Deploying to Production ==="
          cp -r html/prod/* /home/andrew/web_server/html/prod/
          echo "Deployment complete."

      - name: Verify Production Container
        run: |
          echo "=== Verifying nginx-prod container ==="
          sleep 5
          TITLE=$(docker exec nginx-prod grep -o "Production" /usr/share/nginx/html/index.html || true)
          if [ -z "$TITLE" ]; then
            echo "❌ Verification failed: 'Production' not found in /usr/share/nginx/html/index.html"
            exit 1
          else
            echo "✅ Verification passed: Production content detected."
          fi

      - name: Rollback if verification fails
        if: failure()
        run: |
          echo "=== Rolling back to previous backup ==="
          LATEST_BACKUP=$(ls -td /home/andrew/web_server/html/prod_backup_* | head -1)
          if [ -d "$LATEST_BACKUP" ]; then
            rm -rf /home/andrew/web_server/html/prod/*
            cp -r "$LATEST_BACKUP"/* /home/andrew/web_server/html/prod/
            echo "Rollback completed using backup: $LATEST_BACKUP"
          else
            echo "⚠️ No backup directory found to restore from!"
          fi

      - name: Retention — delete backups older than 7 days
        run: |
          echo "=== Cleaning up old backups ==="
          find /home/andrew/web_server/html/ -maxdepth 1 -type d -name "prod_backup_*" -mtime +7 -exec rm -rf {} \;
          echo "Old backups cleaned up."

