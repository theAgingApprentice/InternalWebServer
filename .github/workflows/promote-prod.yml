name: Promote to Production

on:
  workflow_dispatch:

jobs:
  promote-to-prod:
    name: Promote Web Content to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ✅ Validate required secrets before connecting
      - name: Validate required secrets
        run: |
          missing=""
          for var in DEPLOY_HOST DEPLOY_USER SSH_PRIVATE_KEY DEPLOY_PATH; do
            if [ -z "${!var}" ]; then
              echo "❌ Missing secret: $var"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "🚫 Required secrets missing in repo settings."
            exit 1
          fi
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

      # ✅ SSH into the server to promote /test → /prod with backup & rollback safety
      - name: Promote Test to Production (with verification & rollback)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== Starting Production Promotion Process ==="
            PROD_PATH="${{ secrets.DEPLOY_PATH }}/prod"
            TEST_PATH="${{ secrets.DEPLOY_PATH }}/test"
            BACKUP_DIR="${{ secrets.DEPLOY_PATH }}/backups"
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            BACKUP_PATH="$BACKUP_DIR/prod_backup_$TIMESTAMP"

            echo "Creating backup directory if needed..."
            mkdir -p "$BACKUP_DIR"

            echo "Backing up current /prod to $BACKUP_PATH..."
            cp -r "$PROD_PATH" "$BACKUP_PATH"

            echo "Replacing /prod content with /test content..."
            rm -rf "$PROD_PATH"
            cp -r "$TEST_PATH" "$PROD_PATH"

            echo "Restarting nginx-prod container..."
            docker restart nginx-prod

            echo "Verifying production container content..."
            sleep 3
            if docker exec nginx-prod grep -q "Production" /usr/share/nginx/html/index.html; then
              echo "✅ Verification successful: 'Production' found in index.html"
            else
              echo "❌ Verification failed: reverting to previous backup..."
              rm -rf "$PROD_PATH"
              cp -r "$BACKUP_PATH" "$PROD_PATH"
              docker restart nginx-prod
              echo "Rollback complete."
              exit 1
            fi

            echo "Cleaning up backups older than 7 days..."
            find "$BACKUP_DIR" -maxdepth 1 -type d -mtime +7 -name 'prod_backup_*' -exec rm -rf {} \;

            echo "✅ Promotion completed successfully and verified."

      # 🚫 Email notifications (currently commented out)
      # - name: Send Email Notification
      #   if: always()
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 465
      #     username: ${{ secrets.SMTP_USERNAME }}
      #     password: ${{ secrets.SMTP_PASSWORD }}
      #     subject: "Production Promotion Result"
      #     to: ${{ secrets.NOTIFY_EMAIL }}
      #     from: "GitHub Actions <${{ secrets.SMTP_USERNAME }}>"
      #     secure: true
      #     body: |
      #       The promote-to-production workflow has completed.
      #       Status: ${{ job.status }}

      - name: Done
        run: echo "🚀 Promote-to-production workflow finished."
