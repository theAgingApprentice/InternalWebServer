name: Promote to Production

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Copy production files to server
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            html/prod/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/prod/

      - name: Restart nginx-prod container
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
          "docker restart nginx-prod"

      - name: Wait for restart
        run: sleep 5

      - name: Verify production deployment
        run: |
          echo "Verifying production deployment at https://${{ secrets.DEPLOY_HOST }}/ ..."
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" https://${{ secrets.DEPLOY_HOST }}/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Production verification failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Production deployment verified successfully!"

