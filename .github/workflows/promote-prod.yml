name: Promote to Production

on:
  workflow_dispatch:

jobs:
  promote-to-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backup current production and promote new version
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.UBUNTU_SERVER_IP }}
          username: ${{ secrets.UBUNTU_USERNAME }}
          key: ${{ secrets.UBUNTU_SSH_KEY }}
          script: |
            set -e
            echo "== Step 1: Creating backup of current production =="
            TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
            BACKUP_DIR="/home/${{ secrets.UBUNTU_USERNAME }}/web_server/html/prod-backup-${TIMESTAMP}"
            sudo cp -r /home/${{ secrets.UBUNTU_USERNAME }}/web_server/html/prod "$BACKUP_DIR"
            echo "✅ Backup created at $BACKUP_DIR"

            echo "== Step 2: Promoting test to production =="
            sudo rm -rf /home/${{ secrets.UBUNTU_USERNAME }}/web_server/html/prod/*
            sudo cp -r /home/${{ secrets.UBUNTU_USERNAME }}/web_server/html/test/* /home/${{ secrets.UBUNTU_USERNAME }}/web_server/html/prod/
            sudo docker restart nginx-prod
            echo "✅ Production container restarted with new content."

            echo "== Step 3: Cleaning up old backups (older than 7 days) =="
            sudo find /home/${{ secrets.UBUNTU_USERNAME }}/web_server/html/ -maxdepth 1 -type d -name "prod-backup-*" -mtime +7 -exec rm -rf {} +
            echo "🧹 Old backups removed (if any)."

      - name: Verify production container content
        id: verify
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.UBUNTU_SERVER_IP }}
          username: ${{ secrets.UBUNTU_USERNAME }}
          key: ${{ secrets.UBUNTU_SSH_KEY }}
          script: |
            echo "== Step 4: Verifying production container =="
            if sudo docker exec nginx-prod cat /usr/share/nginx/html/index.html | grep -q "Production"; then
              echo "✅ Verification passed: 'Production' string found."
              echo "verify_result=success" >> $GITHUB_OUTPUT
            else
              echo "❌ Verification failed: Expected 'Production' string not found."
              echo "verify_result=failure" >> $GITHUB_OUTPUT
              exit 1
            fi

      - name: Roll back if verification failed
        if: steps.verify.outputs.verify_result == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.UBUNTU_SERVER_IP }}
          username: ${{ secrets.UBUNTU_USERNAME }}
          key: ${{ secrets.UBUNTU_SSH_KEY }}
          script: |
            echo "⚠️ Verification failed — rolling back to last known good backup..."
            LATEST_BACKUP=$(ls -td /home/${{ secrets.UBUNTU_USERNAME }}/web_server/html/prod-backup-* | head -n 1)
            if [ -d "$LATEST_BACKUP" ]; then
              sudo rm -rf /home/${{ secrets.UBUNTU_USERNAME }}/web_server/html/prod/*
              sudo cp -r "$LATEST_BACKUP"/* /home/${{ secrets.UBUNTU_USERNAME }}/web_server/html/prod/
              sudo docker restart nginx-prod
              echo "✅ Rollback completed from $LATEST_BACKUP"
            else
              echo "❌ No backup found — manual intervention required."
              exit 1
            fi

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: >
            MitchellNET Production Deployment ${{ job.status }}
          to: ${{ secrets.MAIL_TO }}
          from: MitchellNET CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            The Promote to Production workflow has completed with status: **${{ job.status }}**

            - **Environment:** Production
            - **Verification Result:** ${{ steps.verify.outputs.verify_result || 'N/A' }}
            - **Rollback:** ${{ steps.verify.outputs.verify_result == 'failure' && 'Performed ⚠️' || 'Not needed ✅' }}
            - **Backup Cleanup:** Performed automatically for backups older than 7 days 🧹
            - **Timestamp:** ${{ github.run_started_at }}
            - **Run URL:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
