version: "3.9"

services:
  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy-dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - nginx-prod
      - fitness-tracker-backend
    networks:
      - dev-webnet

  nginx-prod:
    image: nginx:latest
    container_name: nginx-prod-dev
    volumes:
      - ./html/prod:/usr/share/nginx/html:ro
    networks:
      - dev-webnet

  mariadb:
    image: mariadb:10.7
    container_name: mariadb-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: fitness_tracker_dev
      MYSQL_USER: ${DB_USER:-fitness_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fitness_password}
    volumes:
      - mariadb_dev_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    networks:
      - dev-webnet

  fitness-tracker-backend:
    build:
      context: ./backend/fitnessTracker
      dockerfile: Dockerfile
    container_name: fitness-tracker-backend-dev
    environment:
      - ENVIRONMENT=development
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=fitness_tracker_dev
      - DB_USER=${DB_USER:-fitness_user}
      - DB_PASSWORD=${DB_PASSWORD:-fitness_password}
      - FLASK_DEBUG=1
    depends_on:
      - mariadb
    ports:
      - "5001:5000"
    volumes:
      - ./backend/fitnessTracker:/app
    networks:
      - dev-webnet

volumes:
  mariadb_dev_data:

networks:
  dev-webnet:
    name: dev-webnet
