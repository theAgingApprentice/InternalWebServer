version: '3.8'  # Docker Compose file format version

# ------------------------------------------------------------
# Named Volumes (for persistent storage)
# ------------------------------------------------------------
volumes:
  prometheus_data: {}  # Stores Prometheus time-series data
  grafana_data: {}     # Stores Grafana dashboards and settings

# ------------------------------------------------------------
# Network Definition
# ------------------------------------------------------------
networks:
  monitoring:
    driver: bridge  # Default network driver; isolates monitoring traffic

# ------------------------------------------------------------
# Services
# ------------------------------------------------------------
services:
  # ==========================================================
  # PROMETHEUS - Metrics collection and storage
  # ==========================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      # Mount your Prometheus config directory
      - ./prometheus:/etc/prometheus
      # Persistent data volume for metric history
      - prometheus_data:/prometheus
    command:
      # Configuration and data path options
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      # Enable HTTP reload API (useful when updating configs)
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"  # Access Prometheus UI at http://localhost:9090
    networks:
      - monitoring
    restart: unless-stopped

  # ==========================================================
  # GRAFANA - Visualization dashboard for Prometheus metrics
  # ==========================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      # Auto-provision datasources and dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
      # Persistent Grafana data (users, dashboards, plugins)
      - grafana_data:/var/lib/grafana
    environment:
      # Change password for production use
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=your_strong_grafana_password_here
    ports:
      - "3000:3000"  # Access Grafana UI at http://localhost:3000
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus  # Ensure Prometheus starts first

  # ==========================================================
  # NODE EXPORTER - Collects host (Ubuntu iMac) system metrics
  # ==========================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"  # Prometheus scrapes from node-exporter:9100
    networks:
      - monitoring
    restart: unless-stopped

  # ==========================================================
  # SNMP EXPORTER - Polls SNMP-enabled devices (routers, printers)
  # ==========================================================
  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    volumes:
      # Custom SNMP configuration file defining MIBs and devices
      - ./snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    command:
      - --config.file=/etc/snmp_exporter/snmp.yml
    ports:
      - "9116:9116"  # Prometheus scrapes SNMP metrics via this port
    networks:
      - monitoring
    restart: unless-stopped

  # ==========================================================
  # BLACKBOX EXPORTER - Performs ICMP ping/HTTP/TCP probes
  # ==========================================================
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    # Uncomment the next section if you add a custom probe config:
    # volumes:
    #   - ./blackbox_exporter/blackbox.yml:/etc/blackbox_exporter/config.yml
    ports:
      - "9115:9115"  # Prometheus scrapes results here
    networks:
      - monitoring
    restart: unless-stopped

  # ==========================================================
  # OPTIONAL: CADVISOR - Collects Docker container metrics
  # ==========================================================
