<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Environment Banner -->
    <div id="env-banner" class="env-prod">
    </div>

    <!-- Include Header -->
    <div data-include="/header.html"></div>

    <div class="content">
        <div class="container">
            <header>
                <h1>Fitness Tracker</h1>
                <p class="subtitle">Track your fitness journey with ease</p>
            </header>

            <div class="status">
                <div id="apiStatus" class="status-indicator">
                    <span id="statusText">Checking API...</span>
                </div>
            </div>

            <main>
            <section class="add-item">
                <h2>Add New Item</h2>
                <form id="addItemForm">
                    <div class="form-group">
                        <label for="itemName">Name:</label>
                        <input type="text" id="itemName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="itemDescription">Description:</label>
                        <textarea id="itemDescription" name="description" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Item</button>
                </form>
            </section>

            <section class="items-list">
                <h2>Items List</h2>
                <div id="itemsContainer">
                    <p class="loading">Loading items...</p>
                </div>
            </section>
        </main>

        <footer>
            <p>Environment: <span id="environment">Unknown</span></p>
        </footer>
    </div>
    </div>

    <!-- Include Footer -->
    <div data-include="/footer.html"></div>

    <!-- Scripts -->
    <script src="/js/includes.js" defer></script>
    <script src="js/app.js"></script>
</body>
</html>
