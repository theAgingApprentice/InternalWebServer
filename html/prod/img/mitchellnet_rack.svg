<svg viewBox="0 0 520 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <rect width="520" height="580" fill="#f8fafc"/>
  <text x="260" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">MitchellNET — Rack Elevation</text>
  <text x="260" y="42" text-anchor="middle" font-size="10" fill="#64748b">Future State · London, Ontario</text>

  <!-- Rack frame -->
  <rect x="80" y="55" width="360" height="490" rx="6" fill="#1e293b" stroke="#0f172a" stroke-width="2" filter="url(#shadow)"/>

  <!-- Rack rails left/right -->
  <rect x="80" y="55" width="22" height="490" rx="3" fill="#334155"/>
  <rect x="418" y="55" width="22" height="490" rx="3" fill="#334155"/>

  <!-- U markers -->
  <text x="68" y="100" text-anchor="end" font-size="8" fill="#94a3b8">1U</text>
  <text x="68" y="136" text-anchor="end" font-size="8" fill="#94a3b8">2U</text>
  <text x="68" y="172" text-anchor="end" font-size="8" fill="#94a3b8">3U</text>
  <text x="68" y="208" text-anchor="end" font-size="8" fill="#94a3b8">4U</text>
  <text x="68" y="244" text-anchor="end" font-size="8" fill="#94a3b8">5U</text>
  <text x="68" y="280" text-anchor="end" font-size="8" fill="#94a3b8">6U</text>
  <text x="68" y="316" text-anchor="end" font-size="8" fill="#94a3b8">7U</text>
  <text x="68" y="352" text-anchor="end" font-size="8" fill="#94a3b8">8U</text>
  <text x="68" y="388" text-anchor="end" font-size="8" fill="#94a3b8">9U</text>
  <text x="68" y="424" text-anchor="end" font-size="8" fill="#94a3b8">10U</text>
  <text x="68" y="460" text-anchor="end" font-size="8" fill="#94a3b8">11U</text>
  <text x="68" y="496" text-anchor="end" font-size="8" fill="#94a3b8">12U</text>

  <!-- 1U: Patch Panel (cable management) -->
  <rect x="102" y="68" width="316" height="28" rx="2" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="260" y="80" text-anchor="middle" font-size="9" fill="#9ca3af">Patch Panel / Cable Management</text>
  <text x="260" y="90" text-anchor="middle" font-size="8" fill="#6b7280">Cat6a · SFP+ DAC organization</text>

  <!-- 2U: OPNsense Firewall -->
  <rect x="102" y="100" width="316" height="32" rx="2" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="102" y="100" width="8" height="32" rx="1" fill="#dc2626"/>
  <text x="270" y="114" text-anchor="middle" font-size="10" font-weight="bold" fill="#fef2f2">OPNsense Firewall — Netgate 6100</text>
  <text x="270" y="126" text-anchor="middle" font-size="8" fill="#fca5a5">DHCP · DNS · IDS/IPS · VLAN Gateway · AES-NI · SFP+ WAN/LAN</text>
  <!-- activity LEDs -->
  <circle cx="388" cy="110" r="3" fill="#22c55e"/>
  <circle cx="398" cy="110" r="3" fill="#22c55e"/>
  <circle cx="408" cy="110" r="3" fill="#f59e0b"/>

  <!-- 3U: MikroTik Core -->
  <rect x="102" y="136" width="316" height="32" rx="2" fill="#14532d" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="102" y="136" width="8" height="32" rx="1" fill="#16a34a"/>
  <text x="270" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#f0fdf4">MikroTik CRS317 — Core 10G Switch</text>
  <text x="270" y="162" text-anchor="middle" font-size="8" fill="#86efac">16x SFP+ (10GbE) · VLAN Trunk · SNMP · SwOS/RouterOS · 1RU</text>
  <!-- port indicators -->
  <rect x="380" y="142" width="6" height="6" rx="1" fill="#22c55e"/>
  <rect x="390" y="142" width="6" height="6" rx="1" fill="#22c55e"/>
  <rect x="400" y="142" width="6" height="6" rx="1" fill="#22c55e"/>
  <rect x="410" y="142" width="6" height="6" rx="1" fill="#3b82f6"/>

  <!-- 4U: TP-Link OOB -->
  <rect x="102" y="172" width="316" height="28" rx="2" fill="#1c1917" stroke="#78716c" stroke-width="1.2"/>
  <rect x="102" y="172" width="8" height="28" rx="1" fill="#78716c"/>
  <text x="270" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#e7e5e4">TP-Link TL-SG108E — OOB Switch</text>
  <text x="270" y="196" text-anchor="middle" font-size="8" fill="#a8a29e">8-port 1GbE · Out-of-Band Mgmt Rail · Always-on Lifeline</text>

  <!-- 5U: Blank / spacer -->
  <rect x="102" y="204" width="316" height="28" rx="2" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="260" y="222" text-anchor="middle" font-size="9" fill="#374151">— spare 1U —</text>

  <!-- 6U-7U: Ubuntu iMac Server (2U) -->
  <rect x="102" y="236" width="316" height="60" rx="2" fill="#78350f" stroke="#d97706" stroke-width="1.5"/>
  <rect x="102" y="236" width="8" height="60" rx="1" fill="#d97706"/>
  <text x="270" y="254" text-anchor="middle" font-size="10" font-weight="bold" fill="#fef9c3">Ubuntu iMac Server (2019)</text>
  <text x="270" y="268" text-anchor="middle" font-size="8" fill="#fde68a">Nginx Reverse Proxy · Mosquitto MQTT Broker</text>
  <text x="270" y="280" text-anchor="middle" font-size="8" fill="#fde68a">Grafana · Prometheus · LibreNMS · InfluxDB</text>
  <text x="270" y="292" text-anchor="middle" font-size="8" fill="#fde68a">Docker · DHCP/DNS fallback · VLAN 10/40</text>
  <circle cx="388" cy="248" r="3" fill="#22c55e"/>
  <circle cx="398" cy="248" r="3" fill="#22c55e"/>

  <!-- 8U: NAS -->
  <rect x="102" y="300" width="316" height="32" rx="2" fill="#2e1065" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="102" y="300" width="8" height="32" rx="1" fill="#7c3aed"/>
  <text x="270" y="314" text-anchor="middle" font-size="10" font-weight="bold" fill="#f5f3ff">NAS — 10GbE Storage</text>
  <text x="270" y="326" text-anchor="middle" font-size="8" fill="#c4b5fd">SFP+ 10G to Core · IPMI to OOB · VLAN 20 · Jumbo Frames MTU 9000</text>

  <!-- 9U: Raspberry Pi DMZ -->
  <rect x="102" y="336" width="316" height="28" rx="2" fill="#0c4a6e" stroke="#0284c7" stroke-width="1.2"/>
  <rect x="102" y="336" width="8" height="28" rx="1" fill="#0284c7"/>
  <text x="270" y="348" text-anchor="middle" font-size="10" font-weight="bold" fill="#e0f2fe">Raspberry Pi 5 — DMZ Server</text>
  <text x="270" y="360" text-anchor="middle" font-size="8" fill="#bae6fd">Hardened · External HTTPS only · VLAN 40 · Isolated</text>

  <!-- 10U: blank -->
  <rect x="102" y="368" width="316" height="28" rx="2" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="260" y="386" text-anchor="middle" font-size="9" fill="#374151">— spare 1U —</text>

  <!-- 11U: UPS / PDU -->
  <rect x="102" y="400" width="316" height="28" rx="2" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.2"/>
  <rect x="102" y="400" width="8" height="28" rx="1" fill="#6366f1"/>
  <text x="270" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#e0e7ff">UPS / PDU</text>
  <text x="270" y="424" text-anchor="middle" font-size="8" fill="#a5b4fc">Battery backup · Power distribution · Surge protection</text>

  <!-- 12U: blank -->
  <rect x="102" y="432" width="316" height="28" rx="2" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="260" y="450" text-anchor="middle" font-size="9" fill="#374151">— spare 1U —</text>

  <!-- Note below rack: off-rack items -->
  <text x="260" y="480" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">Off-rack:</text>
  <text x="260" y="493" text-anchor="middle" font-size="9" fill="#94a3b8">Mac Studio (desk) · Bell HH3000 (wall mount) · UniFi APs (ceiling/wall) · Lab Bench Switch &amp; instruments (workshop)</text>

  <!-- Bottom label -->
  <text x="260" y="556" text-anchor="middle" font-size="9" fill="#64748b">All rack units 1RU unless noted. Measurements approx.</text>
</svg>
