<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MitchellNET — Production</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <!-- Environment Banner -->
  <div id="env-banner" class="env-prod">
    ✅ PRODUCTION ENVIRONMENT
  </div>

  <!-- Include Header -->
  <div data-include="/header.html"></div>

  <main class="content">
    <section>
      <h2>Welcome to the Production Environment</h2>
      <p>
        This is the live internal site served from the production container.
      </p>
      <p>
        All content here has passed testing and review in the <strong>Test Environment</strong>.
      </p>
      <a href="https://test.mitchellnet.local"
         class="button secondary"
         data-env-link="test">Go to Test</a>
    </section>
  </main>

  <!-- Include Footer -->
  <div data-include="/footer.html"></div>

  <!-- Scripts -->
  <script src="/js/includes.js" defer></script>
</body>
</html>
