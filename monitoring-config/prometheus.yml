global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['192.168.2.10:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['192.168.2.10:9100']

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://192.168.2.10
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.2.10:9115

  - job_name: 'snmp'
    static_configs:
      - targets: ['192.168.2.10']
    metrics_path: /snmp
    params:
      module: [if_mib]
      community: ['public']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: instance
        replacement: 192.168.2.10
      - target_label: __address__
        replacement: 192.168.2.10:9116
