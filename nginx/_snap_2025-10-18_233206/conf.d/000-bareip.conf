##############################################################
# Bare-IP virtual host (retire /prod and /test paths)
# - HTTP: redirect everything to prod.mitchellnet.local
# - HTTPS: "/" redirects to prod.mitchellnet.local; everything else 404
##############################################################

# ---- HTTP (80) → redirect all to prod subdomain ----
server {
    listen 80 default_server;
    server_name 192.168.2.10;

    return 301 https://prod.mitchellnet.local/;
}

# ---- HTTPS (443) bare IP host ----
server {
    listen 443 ssl default_server;
    server_name 192.168.2.10;

    # Certs (same as before)
    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Redirect ONLY the bare root to prod subdomain
    location = / {
        return 301 https://prod.mitchellnet.local/;
    }

    # Everything else is gone (explicitly 404)
    location / {
        return 404;
    }
}
