##############################################################
# PROD vhost — https://prod.mitchellnet.local
##############################################################

# HTTP → HTTPS
server {
    listen 80;
    server_name prod.mitchellnet.local;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name prod.mitchellnet.local;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # All requests go to nginx-prod
    location / {
        # Enable SSI on HTML so injected includes render
        ssi on;

        # Ensure HTML is not compressed so SSI can parse it
        proxy_set_header Accept-Encoding "";

        proxy_pass http://nginx-prod;
        add_header X-Upstream prod;
    }

    # Serve include fragments from the proxy host
    location /includes/ {
        alias /home/andrew/web_server/includes/;
        autoindex off;
        add_header Cache-Control "no-store";
    }
}
