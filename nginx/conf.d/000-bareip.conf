##############################################################
# Bare-IP virtual host - Serve content directly on IP address
# - HTTP: redirect to HTTPS on same IP
# - HTTPS: serve production content
##############################################################

# ---- HTTP (80) → redirect to HTTPS on same IP ----
server {
    listen 80 default_server;
    server_name 192.168.2.10;

    return 301 https://$host$request_uri;
}

# ---- HTTPS (443) bare IP host ----
server {
    listen 443 ssl default_server;
    server_name 192.168.2.10;

    # Certs (same as before)
    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API requests go to fitness-tracker-backend
    location /api/ {
        proxy_pass http://fitness-tracker-backend-prod:5000/api/;
        proxy_http_version 1.1;
        add_header X-Upstream fitness-tracker-backend;
    }

    # All other requests go to nginx-prod
    location / {
        # Enable SSI on HTML so injected includes render
        ssi on;

        # Ensure HTML is not compressed so SSI can parse it
        proxy_set_header Accept-Encoding "";

        proxy_pass http://nginx-prod;
        add_header X-Upstream production;
    }

    # Serve include fragments from the proxy host
    location /includes/ {
        alias /home/andrew/web_server/includes/;
        autoindex off;
        add_header Cache-Control "no-store";
    }
}
