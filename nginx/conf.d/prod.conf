##############################################################
# PRODUCTION — https://mitchellnet.local
##############################################################

# HTTP → HTTPS
server {
    listen 80;
    server_name mitchellnet.local;
    return 301 https://$host$request_uri;
}

# HTTPS - Production
server {
    listen 443 ssl;
    server_name mitchellnet.local;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # BIS endpoints — longer timeouts for waveform capture and multimeter logging
    location /api/bench/ {
        proxy_pass http://bench-instrument-service:8000/;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header X-Upstream bench-instrument-service;
    }

    # Fitness tracker container
    location /fitness/ {
        proxy_pass http://fitness-tracker:5000/;
        proxy_http_version 1.1;
        add_header X-Upstream fitness-tracker;
    }

    # API requests go to fitness-tracker-backend
    location /api/ {
        proxy_pass http://fitness-tracker-backend-prod:5000/api/;
        proxy_http_version 1.1;
        add_header X-Upstream fitness-tracker-backend;
    }

    # All other requests go to nginx-prod
    location / {
        # Enable SSI on HTML so injected includes render
        ssi on;

        # Ensure HTML is not compressed so SSI can parse it
        proxy_set_header Accept-Encoding "";

        proxy_pass http://nginx-prod;
        add_header X-Upstream production;
    }

    # Serve include fragments from the proxy host
    location /includes/ {
        alias /home/andrew/web_server/includes/;
        autoindex off;
        add_header Cache-Control "no-store";
    }
}
