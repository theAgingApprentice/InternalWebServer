##############################################################
# Shared TLS and security-header parameters
# Included by every SSL server{} block in this nginx-proxy.
# Phase 0 Item 6 — hardened 2026-06-13
##############################################################

# TLS versions — drop 1.0 and 1.1
ssl_protocols TLSv1.2 TLSv1.3;

# Strong cipher suite; server preference wins
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
ssl_prefer_server_ciphers off;

# Session resumption
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# Security headers
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header X-Frame-Options            "SAMEORIGIN"                          always;
add_header X-Content-Type-Options     "nosniff"                             always;
add_header Referrer-Policy            "no-referrer-when-downgrade"          always;
add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
# Note: we're intentionally leaving CSP out for now — a blanket CSP for a site with SSI,
# multiple upstreams, and inline scripts needs careful tuning and deserves its own item.
# The other five headers are safe to apply universally.
