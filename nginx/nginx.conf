##############################################################
# Custom nginx.conf — overrides image default
# Identical to stock nginx:1.29 default except:
#   - server_tokens off  (Phase 0 Item 6 — 2026-06-13)
##############################################################

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Hide nginx version from headers and error pages
    server_tokens off;

    # Security headers — applied globally (not in server/location blocks due to NGINX add_header inheritance)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "no-referrer-when-downgrade"          always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;

    include /etc/nginx/conf.d/*.conf;
}
