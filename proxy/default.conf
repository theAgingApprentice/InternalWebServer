# Dev reverse proxy that terminates TLS and routes by Host header
# - prod.dev.mitchellnet.local -> nginx-prod-dev
# - test.dev.mitchellnet.local -> nginx-test-dev

# Upstreams
upstream prod_app { server nginx-prod-dev:80; }
upstream test_app { server nginx-test-dev:80; }

# Map dev host to upstream
map $host $backend {
  default                       prod_app;           # safe default
  prod.dev.mitchellnet.local    prod_app;
  test.dev.mitchellnet.local    test_app;
}

# Redirect dev hostnames to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name prod.dev.mitchellnet.local test.dev.mitchellnet.local;
  return 301 https://$host$request_uri;
}

# HTTPS virtual host for dev hostnames only
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name prod.dev.mitchellnet.local test.dev.mitchellnet.local;

  # Local dev certificate
  ssl_certificate     /etc/nginx/ssl/dev.crt;
  ssl_certificate_key /etc/nginx/ssl/dev.key;

  # Basic security headers (dev-friendly)
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-XSS-Protection "1; mode=block";
  add_header Referrer-Policy no-referrer-when-downgrade;

  # MIME map
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Static asset caching (short for dev)
  location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    add_header Cache-Control "public, max-age=300";
    proxy_pass http://$backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Everything else
  location / {
    proxy_pass http://$backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
